services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: racequant
      POSTGRES_USER: racequant
      POSTGRES_PASSWORD: racequant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racequant -d racequant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_NAME: RaceQuant
      APP_ENV: local
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://racequant:racequant@postgres:5432/racequant
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
